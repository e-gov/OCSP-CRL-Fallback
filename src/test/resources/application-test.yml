spring:
  ssl:
    bundle:
      pem:
        ocsp:
          keystore:
            certificate: classpath:certificates/ocsp/ocsp.crt.pem
            private-key: classpath:certificates/ocsp/ocsp.key.pem
            verify-keys: true
        tls:
          keystore:
            certificate: classpath:certificates/tls/localhost.crt.pem
            private-key: classpath:certificates/tls/localhost.key.pem
        test_esteid2018-tls:
          truststore:
            certificate: classpath:certificates/tls/localhost.ca.crt.pem
        test_esteid2025-tls:
          truststore:
            certificate: classpath:certificates/tls/localhost.ca.crt.pem
        test_esteid2018-crl:
          truststore:
            certificate: /etc/ocspcrl/secrets/eid/TEST_of_ESTEID2018.crt.pem
        test_esteid2025-crl:
          truststore:
            certificate: /etc/ocspcrl/secrets/eid/testEEGovCA2025.crt.pem

ocsp-crl-fallback:
  crl-loading-interval: 30s
  certificate-chains:
    - name: test_esteid2018
      issuer-certificate: classpath:certificates/eid/TEST_of_ESTEID2018.crt.pem
      crl-download:
        url: https://c.sk.ee/test_esteid2018.crl
        timeout: 5s
        tls-truststore-bundle: test_esteid2018-tls
        crl-truststore-bundle: test_esteid2018-crl
    - name: test_esteid2025
      issuer-certificate: classpath:certificates/eid/testEEGovCA2025.crt.pem
      crl-download:
        url: https://crl-test.eidpki.ee/testESTEID2025.crl
        timeout: 5s
        tls-truststore-bundle: test_esteid2025-tls
        crl-truststore-bundle: test_esteid2025-crl
  tmp-path: target/tmp
  crl-path: target/crl
